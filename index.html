// 渲染
const grid = document.getElementById('grid');
const filterGroup = document.getElementById('filterGroup');
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');

let currentFilter = 'all';
let currentSearch = '';
let currentSort = 'time-desc';

function render() {
  let list = DATA.hotspots.slice();

  // 筛选分类
  if (currentFilter !== 'all') {
    list = list.filter(h => h.category === currentFilter);
  }
  // 搜索
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(h =>
      h.title.toLowerCase().includes(q) ||
      h.summary.toLowerCase().includes(q) ||
      h.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  // 排序
  if (currentSort === 'time-desc') {
    list.sort((a,b) => b.publish_time.localeCompare(a.publish_time));
  } else if (currentSort === 'time-asc') {
    list.sort((a,b) => a.publish_time.localeCompare(b.publish_time));
  } else if (currentSort === 'category') {
    const order = {'大模型':0,'芯片':1,'新产品':2};
    list.sort((a,b) => order[a.category] - order[b.category]);
  }

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>没有匹配的热点，换个关键词试试</p></div>';
    return;
  }

  grid.innerHTML = list.map(h => `
    <div class="card" data-category="${h.category}" data-url="${h.url}">
      <div class="card-header">
        <span class="category-tag ${h.category}">${h.category}</span>
        <span class="time-tag">${h.publish_time.slice(5)}</span>
      </div>
      <h3>${h.title}</h3>
      <p>${h.summary}</p>
      <div class="card-footer">
        <div class="card-tags">
          ${h.tags.slice(0,3).map(t => `<span class="card-tag">#${t}</span>`).join('')}
        </div>
        <a href="${h.url}" target="_blank" class="card-link" onclick="event.stopPropagation()">原文 →</a>
      </div>
    </div>
  `).join('');

  // 卡片点击跳转
  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => {
      const url = c.dataset.url;
      if (url) window.open(url, '_blank');
    });
  });
}

function updateCounts() {
  const counts = {
    all: DATA.hotspots.length,
    '大模型': DATA.hotspots.filter(h => h.category === '大模型').length,
    '芯片': DATA.hotspots.filter(h => h.category === '芯片').length,
    '新产品': DATA.hotspots.filter(h => h.category === '新产品').length
  };
  document.getElementById('cntAll').textContent = counts.all;
  document.getElementById('cntAI').textContent = counts['大模型'];
  document.getElementById('cntChip').textContent = counts['芯片'];
  document.getElementById('cntProduct').textContent = counts['新产品'];
  document.getElementById('statTotal').textContent = counts.all;
  document.getElementById('statAI').textContent = counts['大模型'];
  document.getElementById('statChip').textContent = counts['芯片'];
  document.getElementById('statProduct').textContent = counts['新产品'];
}

async function loadData() {
  try {
    const response = await fetch(`data.json?ts=${Date.now()}`, { cache: 'no-store' });
    if (!response.ok) throw new Error(`data.json ${response.status}`);
    DATA = await response.json();
  } catch (error) {
    console.warn('Using inline fallback data:', error);
  }
}

async function init() {
  await loadData();
  document.getElementById('navDate').textContent = `${DATA.date} · ${DATA.weekday}`;
  document.getElementById('heroDate').textContent = `📅 ${DATA.date}（${DATA.weekday}）`;
  document.getElementById('heroSummary').textContent = DATA.summary;
  document.getElementById('updateTime').textContent = DATA.date;
  updateCounts();
  render();
}

filterGroup.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

searchInput.addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  render();
});

sortSelect.addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

init();
</script>
